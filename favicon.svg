<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <style>
    .bg { fill: #ffffff; }
    .fg { fill: #000000; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #15181d; }
      .fg { fill: #ece8d8; }
    }
  </style>
  <rect class="bg" width="32" height="32"/>
  <!-- floppy body -->
  <rect class="fg" x="4" y="3" width="24" height="26"/>
  <!-- metal shutter (top) -->
  <rect class="bg" x="8" y="6" width="16" height="6"/>
  <!-- shutter spring divider -->
  <rect class="fg" x="13" y="6" width="2" height="6"/>
  <!-- label area -->
  <rect class="bg" x="6" y="15" width="20" height="12"/>
  <!-- label text lines -->
  <rect class="fg" x="8" y="17" width="16" height="1"/>
  <rect class="fg" x="8" y="20" width="16" height="1"/>
  <rect class="fg" x="8" y="23" width="16" height="1"/>
</svg>
